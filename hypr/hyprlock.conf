general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/guilherme/.config/wallpaper/wallpaper3.png  # Coloque o caminho da sua imagem
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 desativa o blur
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# HORA (Relógio Grande)
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 80
    halign = center
    valign = center
}

# DATA
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +'%A, %d de %B')</span>"
    color = rgba(205, 214, 244, 0.7)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# CAMPO DE SENHA
input-field {
    monitor =
    size = 320, 54

    outline_thickness = 3
    rounding = -1

    dots_size = 0.32
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(180, 190, 254, 1.0)
    inner_color = rgba(30, 30, 46, 0.95)
    font_color  = rgba(205, 214, 244, 1.0)

    fade_on_empty = false
    placeholder_text = <i>Senha</i>

    hide_input = true

    check_color = rgba(137, 180, 250, 1.0)
    fail_color  = rgba(243, 139, 168, 1.0)
    fail_text   = <i>Senha incorreta <b>($ATTEMPTS)</b></i>

    position = 0, -140
    halign = center
    valign = center
    zindex = 10
}



# USUÁRIO (Opcional - exibe seu nome acima da senha)
label {
    monitor =
    text = Olá, $USER
    color = rgba(205, 214, 244, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}